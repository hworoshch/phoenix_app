services:
  db:
    image: postgres:15-alpine
    container_name: phoenix_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: phoenix_app_prod
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d phoenix_app_prod"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phoenix_web
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - MIX_ENV=prod
      - PHX_SERVER=true
      - PORT=4000
      - PHX_HOST=localhost
      - DATABASE_URL=ecto://postgres:postgres_password@db:5432/phoenix_app_prod
      - SECRET_KEY_BASE=super_secret_key_base_at_least_64_characters_long_for_production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
